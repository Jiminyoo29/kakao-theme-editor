<script type="text/babel" data-presets="env,react">
const { useState, useContext, createContext, useCallback, useEffect, useRef } = React;


/* ── 유틸 ─────────────────────────────────────────────────────── */
function hexToRgba(hex, alpha = 100) {
  try {
    const h = (hex || '#000000').replace('#','');
    if (h.length !== 6) return hex;
    const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
    const a = Math.max(0, Math.min(100, alpha)) / 100;
    return a >= 1 ? hex : `rgba(${r},${g},${b},${a.toFixed(2)})`;
  } catch { return hex; }
}

/* ══════════════════════════════════════════════════════════════
   buildKtheme(name, colors) → Blob
   실제 KakaoTalk iOS 테마 ZIP을 빌드합니다.
   - KakaoTalkTheme.css  : 공식 CSS 셀렉터 + 속성
   - Images/*.png        : Canvas로 생성한 말풍선 PNG (9-patch 방식)
   ══════════════════════════════════════════════════════════════ */
async function buildKtheme(name, colors) {
  const c = colors;

  /* 테마 ID: ASCII만 허용. 한글만 있으면 'mytheme' 사용 */
  const safeId      = name.replace(/[^a-zA-Z0-9]/g,'').toLowerCase() || 'mytheme';
  const bubbleRadius = typeof c.bubbleRadius === 'number' ? c.bubbleRadius : 20;
  const headerAlpha  = typeof c.headerAlpha  === 'number' ? c.headerAlpha  : 100;

  /* 색상 어둡게 (selected 상태용) */
  function darken(hex, f=0.80) {
    try {
      const h = hex.replace('#','');
      if (h.length !== 6) return hex;
      const d = v => Math.max(0, Math.round(parseInt(v,16)*f)).toString(16).padStart(2,'0');
      return '#' + d(h.slice(0,2)) + d(h.slice(2,4)) + d(h.slice(4,6));
    } catch { return hex; }
  }

  /* 말풍선 PNG 생성 — scale: @1x/@2x/@3x
     S = max(20, 2*bubbleRadius+20)*scale → 최소 20px 신축 영역 확보
     R = bubbleRadius*scale → CSS cap insets와 동일한 반경 */
  async function makeBubblePng(color, scale) {
    const S = Math.max(20, 2 * bubbleRadius + 20) * scale;
    const R = bubbleRadius * scale;
    const cv = document.createElement('canvas');
    cv.width = S; cv.height = S;
    const ctx = cv.getContext('2d');
    ctx.clearRect(0,0,S,S);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(R,0); ctx.lineTo(S-R,0); ctx.arcTo(S,0,S,R,R);
    ctx.lineTo(S,S-R); ctx.arcTo(S,S,S-R,S,R);
    ctx.lineTo(R,S); ctx.arcTo(0,S,0,S-R,R);
    ctx.lineTo(0,R); ctx.arcTo(0,0,R,0,R);
    ctx.closePath(); ctx.fill();
    return new Promise(res => cv.toBlob(b => b.arrayBuffer().then(res), 'image/png'));
  }

  /* 4가지 색 × 3배율 = 12개 PNG 동시 생성 */
  const [
    sN1,sN2,sN3, sS1,sS2,sS3, rN1,rN2,rN3, rS1,rS2,rS3
  ] = await Promise.all([
    makeBubblePng(c.myBubbleBg,          1), makeBubblePng(c.myBubbleBg,          2), makeBubblePng(c.myBubbleBg,          3),
    makeBubblePng(darken(c.myBubbleBg),  1), makeBubblePng(darken(c.myBubbleBg),  2), makeBubblePng(darken(c.myBubbleBg),  3),
    makeBubblePng(c.otherBubbleBg,       1), makeBubblePng(c.otherBubbleBg,       2), makeBubblePng(c.otherBubbleBg,       3),
    makeBubblePng(darken(c.otherBubbleBg),1),makeBubblePng(darken(c.otherBubbleBg),2),makeBubblePng(darken(c.otherBubbleBg),3),
  ]);

  /* CSS 생성 */
  const css = `/* KakaoTalk iOS Theme — generated by Theme Editor */

ManifestStyle {
    -kakaotalk-theme-name: '${name.replace(/'/g,"\\'")}';
    -kakaotalk-theme-version: '1.0';
    -kakaotalk-theme-id: 'custom.theme.${safeId}';
    -kakaotalk-author-name: 'Theme Editor';
}

TabBarStyle-Main {
    background-color: ${c.tabBarBg};
}

HeaderStyle-Main {
    background-color: ${hexToRgba(c.headerBg, headerAlpha)};
    -ios-text-color: ${c.headerText};
    -ios-tab-text-color: ${c.tabBarInactive};
    -ios-tab-highlighted-text-color: ${c.tabBarActive};
}

MainViewStyle-Primary {
    background-color: ${c.mainBg};
    -ios-text-color: ${c.nameText};
    -ios-description-text-color: ${c.timeText};
    -ios-paragraph-text-color: ${c.timeText};
    -ios-normal-background-color: ${c.mainBg};
    -ios-selected-background-color: ${c.mainBg};
}

MainViewStyle-Secondary {
    background-color: ${c.mainBg};
}

BackgroundStyle-ChatRoom {
    background-color: ${c.chatBg};
}

InputBarStyle-Chat {
    background-color: ${c.inputBg};
    -ios-send-normal-background-color: ${c.inputBg};
    -ios-send-normal-foreground-color: ${c.tabBarActive};
    -ios-send-highlighted-background-color: ${c.inputBg};
    -ios-send-highlighted-foreground-color: ${c.tabBarActive};
    -ios-button-normal-foreground-color: ${c.tabBarInactive};
    -ios-button-highlighted-foreground-color: ${c.tabBarActive};
}

/* 내 말풍선 — PNG 이미지로 색상 적용 (cap insets = bubbleRadius pt) */
MessageCellStyle-Send {
    -ios-background-image: 'chatroomBubbleSend01.png' ${bubbleRadius}px ${bubbleRadius}px;
    -ios-selected-background-image: 'chatroomBubbleSend01Selected.png' ${bubbleRadius}px ${bubbleRadius}px;
    -ios-group-background-image: 'chatroomBubbleSend02.png' ${bubbleRadius}px ${bubbleRadius}px;
    -ios-group-selected-background-image: 'chatroomBubbleSend02Selected.png' ${bubbleRadius}px ${bubbleRadius}px;
    -ios-title-edgeinsets: 10px 10px 7px 12px;
    -ios-group-title-edgeinsets: 10px 10px 7px 12px;
    -ios-text-color: ${c.myBubbleText};
    -ios-selected-text-color: ${c.myBubbleText};
    -ios-unread-text-color: ${c.readText};
}

/* 상대방 말풍선 */
MessageCellStyle-Receive {
    -ios-background-image: 'chatroomBubbleReceive01.png' ${bubbleRadius}px ${bubbleRadius}px;
    -ios-selected-background-image: 'chatroomBubbleReceive01Selected.png' ${bubbleRadius}px ${bubbleRadius}px;
    -ios-group-background-image: 'chatroomBubbleReceive02.png' ${bubbleRadius}px ${bubbleRadius}px;
    -ios-group-selected-background-image: 'chatroomBubbleReceive02Selected.png' ${bubbleRadius}px ${bubbleRadius}px;
    -ios-title-edgeinsets: 10px 10px 7px 10px;
    -ios-group-title-edgeinsets: 10px 10px 7px 10px;
    -ios-text-color: ${c.otherBubbleText};
    -ios-selected-text-color: ${c.otherBubbleText};
    -ios-unread-text-color: ${c.timeText};
}

BackgroundStyle-MessageNotificationBar { background-color: ${c.headerBg}; }
LabelStyle-MessageNotificationBarName { -ios-text-color: ${c.nameText}; }
LabelStyle-MessageNotificationBarMessage { -ios-text-color: ${c.timeText}; }
BackgroundStyle-DirectShareBar { background-color: ${c.headerBg}; }
LabelStyle-DirectShareBarName { -ios-text-color: ${c.nameText}; }
LabelStyle-DirectShareBarMessage { -ios-text-color: ${c.timeText}; }

/* 앱 잠금 화면 */
BackgroundStyle-Passcode {
    background-color: ${c.passcodeBg};
}

LabelStyle-PasscodeTitle {
    -ios-text-color: ${c.passcodeTitle};
}

PasscodeStyle {
    background-color: ${c.passcodePadBg};
    -ios-text-color: ${c.passcodePadText};
}
`;

  /* ZIP 빌드 — Images/ 폴더에 말풍선 PNG 8종 × 3배율(@1x/@2x/@3x) = 24개 포함
     iOS는 기기 배율에 따라 자동으로 @2x / @3x 파일을 선택합니다.
     (iPhone 16 Pro = @3x → @3x 파일 없으면 채팅방 적용 실패) */
  const zip = new JSZip();
  zip.file('KakaoTalkTheme.css', css);

  const bubbleDefs = [
    ['chatroomBubbleSend01',          sN1,sN2,sN3],
    ['chatroomBubbleSend01Selected',  sS1,sS2,sS3],
    ['chatroomBubbleSend02',          sN1,sN2,sN3],
    ['chatroomBubbleSend02Selected',  sS1,sS2,sS3],
    ['chatroomBubbleReceive01',         rN1,rN2,rN3],
    ['chatroomBubbleReceive01Selected', rS1,rS2,rS3],
    ['chatroomBubbleReceive02',         rN1,rN2,rN3],
    ['chatroomBubbleReceive02Selected', rS1,rS2,rS3],
  ];
  for (const [n, b1,b2,b3] of bubbleDefs) {
    zip.file(`Images/${n}.png`,    b1);
    zip.file(`Images/${n}@2x.png`, b2);
    zip.file(`Images/${n}@3x.png`, b3);
  }

  const raw = await zip.generateAsync({ type:'uint8array' });
  return new Blob([raw], { type:'application/octet-stream' });
}

/* ── PNG 픽셀 샘플링 ─────────────────────────────────────────── */
function samplePngColor(arrayBuffer) {
  return new Promise(res => {
    const blob = new Blob([arrayBuffer], { type:'image/png' });
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      try {
        const cv = document.createElement('canvas');
        cv.width = img.width; cv.height = img.height;
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const d = ctx.getImageData(Math.floor(img.width/2), Math.floor(img.height/2), 1, 1).data;
        res('#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join(''));
      } catch { res(null); }
      URL.revokeObjectURL(url);
    };
    img.onerror = () => { URL.revokeObjectURL(url); res(null); };
    img.src = url;
  });
}

/* ── .ktheme 파일 파싱 ───────────────────────────────────────── */
async function parseKtheme(file) {
  const zip = await JSZip.loadAsync(await file.arrayBuffer());
  const cssFile = zip.file('KakaoTalkTheme.css');
  if (!cssFile) throw new Error('KakaoTalkTheme.css를 찾을 수 없어요.');
  const css = await cssFile.async('string');

  function prop(sel, p) {
    const sm = css.match(new RegExp(sel.replace(/[-]/g,'\\$&')+'\\s*\\{([^}]+)\\}','i'));
    if (!sm) return null;
    const pm = sm[1].match(new RegExp(p.replace(/[-]/g,'\\$&')+'\\s*:\\s*(#[0-9A-Fa-f]{6})','i'));
    return pm ? pm[1] : null;
  }

  const c = {};
  c.tabBarBg        = prop('TabBarStyle-Main',        'background-color');
  c.headerBg        = prop('HeaderStyle-Main',         'background-color');
  c.headerText      = prop('HeaderStyle-Main',         '-ios-text-color');
  c.tabBarActive    = prop('HeaderStyle-Main',         '-ios-tab-highlighted-text-color');
  c.tabBarInactive  = prop('HeaderStyle-Main',         '-ios-tab-text-color');
  c.mainBg          = prop('MainViewStyle-Primary',    'background-color');
  c.nameText        = prop('MainViewStyle-Primary',    '-ios-text-color');
  c.timeText        = prop('MainViewStyle-Primary',    '-ios-description-text-color');
  c.chatBg          = prop('BackgroundStyle-ChatRoom', 'background-color');
  c.inputBg         = prop('InputBarStyle-Chat',       'background-color');
  c.myBubbleText    = prop('MessageCellStyle-Send',    '-ios-text-color');
  c.readText        = prop('MessageCellStyle-Send',    '-ios-unread-text-color');
  c.otherBubbleText = prop('MessageCellStyle-Receive', '-ios-text-color');
  c.passcodeBg      = prop('BackgroundStyle-Passcode', 'background-color');
  c.passcodeTitle   = prop('LabelStyle-PasscodeTitle', '-ios-text-color');
  c.passcodePadBg   = prop('PasscodeStyle',            'background-color');
  c.passcodePadText = prop('PasscodeStyle',            '-ios-text-color');

  try {
    const f = zip.file('Images/chatroomBubbleSend01.png') || zip.file('Images/chatroomBubbleSend01@2x.png');
    if (f) c.myBubbleBg = await samplePngColor(await f.async('arraybuffer'));
  } catch(_) {}
  try {
    const f = zip.file('Images/chatroomBubbleReceive01.png') || zip.file('Images/chatroomBubbleReceive01@2x.png');
    if (f) c.otherBubbleBg = await samplePngColor(await f.async('arraybuffer'));
  } catch(_) {}

  const rm = css.match(/-ios-background-image:\s*'chatroomBubbleSend01\.png'\s+([\d.]+)px/i);
  if (rm) c.bubbleRadius = parseInt(rm[1]);

  return Object.fromEntries(Object.entries(c).filter(([,v]) => v != null));
}

  { name:'iMessage', bubble:'#007AFF', colors:{ mainBg:'#F2F2F7', chatBg:'#FFFFFF', myBubbleBg:'#007AFF', myBubbleText:'#FFFFFF', readText:'#8E8E93', otherBubbleBg:'#E9E9EB', otherBubbleText:'#000000', headerBg:'#F9F9F9', headerText:'#000000', headerAlpha:100, inputBg:'#FFFFFF', inputText:'#000000', tabBarBg:'#F9F9F9', tabBarActive:'#007AFF', tabBarInactive:'#8E8E93', nameText:'#000000', timeText:'#8E8E93', badgeBg:'#FF3B30', badgeText:'#FFFFFF', bubbleRadius:18, passcodeBg:'#FFFFFF', passcodeTitle:'#000000', passcodeDot:'#000000', passcodePadBg:'#F2F2F7', passcodePadText:'#000000' } },

/* ── Context ──────────────────────────────────────────────────── */
/* ── localStorage 헬퍼 ───────────────────────────────────────── */

const STORAGE_KEY = 'kakao-theme-editor-v1';
function getSaved() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function persistSaved(list) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch {}
}

const Ctx = createContext(null);
function ThemeProvider({ children }) {
  const [colors, setColors]   = useState({ ...DEFAULT_COLORS });
  const [name,   setName]     = useState('나만의 테마');
  const [activeKey, setAK]    = useState(null);
  const [activeLabel, setAL]  = useState('');
  const [saved, setSaved]     = useState(() => getSaved());
  const [canUndo, setCanUndo] = useState(false);
  const [canRedo, setCanRedo] = useState(false);
  const histRef = useRef([{ ...DEFAULT_COLORS }]);
  const histIdx = useRef(0);

  const set = useCallback((k, v) => {
    setColors(p => {
      const next = { ...p, [k]: v };
      const stack = [...histRef.current.slice(0, histIdx.current + 1), next].slice(-100);
      histRef.current = stack;
      histIdx.current = stack.length - 1;
      setCanUndo(histIdx.current > 0);
      setCanRedo(false);
      return next;
    });
  }, []);

  const reset = useCallback(() => {
    const c = { ...DEFAULT_COLORS };
    setColors(c); setName('나만의 테마');
    histRef.current = [c]; histIdx.current = 0;
    setCanUndo(false); setCanRedo(false);
  }, []);

  const undo = useCallback(() => {
    if (histIdx.current <= 0) return;
    histIdx.current--;
    setColors({ ...histRef.current[histIdx.current] });
    setCanUndo(histIdx.current > 0); setCanRedo(true);
  }, []);

  const redo = useCallback(() => {
    if (histIdx.current >= histRef.current.length - 1) return;
    histIdx.current++;
    setColors({ ...histRef.current[histIdx.current] });
    setCanUndo(true); setCanRedo(histIdx.current < histRef.current.length - 1);
  }, []);

  const loadColors = useCallback((newColors) => {
    const c = { ...DEFAULT_COLORS, ...newColors };
    setColors(c);
    const stack = [...histRef.current.slice(0, histIdx.current + 1), c].slice(-100);
    histRef.current = stack; histIdx.current = stack.length - 1;
    setCanUndo(true); setCanRedo(false);
  }, []);

  const enter = useCallback((k,l) => { setAK(k); setAL(l); }, []);
  const leave = useCallback(() => { setAK(null); setAL(''); }, []);

  const saveTheme = useCallback((themeName, themeColors) => {
    const item = { id: Date.now().toString(), name: themeName, colors: themeColors,
      savedAt: new Date().toLocaleDateString('ko-KR') };
    const next = [item, ...getSaved()];
    persistSaved(next); setSaved(next);
  }, []);

  const loadSaved = useCallback((item) => {
    loadColors(item.colors); setName(item.name);
  }, [loadColors]);

  const deleteSaved = useCallback((id) => {
    const next = getSaved().filter(t => t.id !== id);
    persistSaved(next); setSaved(next);
  }, []);

  const importTheme = useCallback(async (file) => {
    try {
      const extracted = await parseKtheme(file);
      loadColors(extracted);
      const n = file.name.replace(/\.ktheme$/i,'').replace(/_/g,' ');
      if (n) setName(n);
    } catch(e) { alert('파일을 불러오지 못했어요: ' + (e.message || '알 수 없는 오류')); }
  }, [loadColors]);

  return (
    <Ctx.Provider value={{ colors, name, setName, set, reset, undo, redo, canUndo, canRedo,
      loadColors, importTheme, activeKey, activeLabel, enter, leave,
      saved, saveTheme, loadSaved, deleteSaved }}>
      {children}
    </Ctx.Provider>
  );
}
const useTheme = () => useContext(Ctx);

/* ── ColorRow ─────────────────────────────────────────────────── */
function ColorRow({ colorKey, label, isLast, type, min, max, unit }) {
  const { colors, set, activeKey, enter, leave } = useTheme();
  const val = colors[colorKey];
  const on  = activeKey === colorKey;
  const baseStyle = { display:'flex', alignItems:'center', minHeight:44, padding:'8px 16px', background:'#fff', transition:'background .12s', borderBottom: isLast?'none':'0.5px solid rgba(60,60,67,.18)' };
  const handlers  = { onMouseEnter:()=>enter(colorKey,label), onMouseLeave:leave, onFocus:()=>enter(colorKey,label), onBlur:leave };
  const cls = `apple-row${on?' active-row':''}`;

  if (type === 'slider') {
    const n = typeof val === 'number' ? val : (min || 0);
    return (
      <div {...handlers} className={cls} style={baseStyle}>
        <span style={{ flex:1, fontSize:15, color:'#000', whiteSpace:'nowrap', letterSpacing:-.1 }}>{label}</span>
        <div style={{ display:'flex', alignItems:'center', gap:8, flexShrink:0 }}>
          <input type="range" min={min} max={max} value={n}
            onChange={e => set(colorKey, Number(e.target.value))}
            style={{ width:90, accentColor:'#007AFF', cursor:'pointer' }} />
          <span style={{ width:42, textAlign:'right', fontSize:13, color:on?'#007AFF':'#8E8E93', fontVariantNumeric:'tabular-nums' }}>{n}{unit}</span>
        </div>
      </div>
    );
  }

  const hex   = typeof val === 'string' ? val : '#000000';
  const valid = /^#[0-9A-Fa-f]{6}$/.test(hex);
  return (
    <div {...handlers} className={cls} style={baseStyle}>
      <span style={{ flex:1, fontSize:15, color:'#000', whiteSpace:'nowrap', letterSpacing:-.1 }}>{label}</span>
      <div style={{ display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
        <input type="text" maxLength={7} value={hex}
          onChange={e=>{ const v=e.target.value; if(/^#[0-9A-Fa-f]{0,6}$/.test(v)) set(colorKey,v); }}
          style={{ width:68, fontSize:13, color:on?'#007AFF':'#8E8E93', textAlign:'right', border:'none', background:'transparent', fontFamily:'ui-monospace, monospace', letterSpacing:'.02em', transition:'color .12s' }} />
        <div style={{ width:28, height:28, borderRadius:8, flexShrink:0, cursor:'pointer', background:valid?hex:'#eee', boxShadow:on?'0 0 0 2px #007AFF, 0 0 0 4px rgba(0,122,255,.2)':'0 0 0 .5px rgba(0,0,0,.18) inset, 0 1px 3px rgba(0,0,0,.1)', position:'relative', overflow:'hidden', transition:'box-shadow .12s' }}>
          <input type="color" value={valid?hex:'#000000'} onChange={e=>set(colorKey,e.target.value)}
            style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity:0, cursor:'pointer' }} />
        </div>
      </div>
    </div>
  );
}

/* ── ControlPanel ─────────────────────────────────────────────── */
function ControlPanel({ width }) {
  const { name, setName, reset, colors, saveTheme, undo, redo, canUndo, canRedo, importTheme } = useTheme();

  useEffect(() => {
    const h = e => {
      if (!(e.metaKey || e.ctrlKey)) return;
      if (e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
      if (e.key === 'z' &&  e.shiftKey) { e.preventDefault(); redo(); }
      if (e.key === 'y')                { e.preventDefault(); redo(); }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [undo, redo]);
  const [status, setStatus] = useState('idle');
  const [tab, setTab] = useState('edit'); // 'edit' | 'saved'
  const [saveFlash, setSaveFlash] = useState(false);

  async function doExport() {
    setStatus('busy');
    try {
      const blob = await buildKtheme(name, colors);
      const url  = URL.createObjectURL(blob);
      Object.assign(document.createElement('a'), { href:url, download:`${name.replace(/[^a-zA-Z0-9가-힣_-]/g,'_')}.ktheme` }).click();
      URL.revokeObjectURL(url);
      setStatus('done');
    } catch(e) { console.error(e); setStatus('err'); }
    setTimeout(() => setStatus('idle'), 2500);
  }

  function doSave() {
    saveTheme(name, colors);
    setSaveFlash(true);
    setTimeout(() => setSaveFlash(false), 1800);
  }

  const SL = { fontSize:11, fontWeight:500, color:'#6D6D72', textTransform:'uppercase', letterSpacing:'.06em', padding:'16px 16px 4px' };

  return (
    <aside style={{ width, flexShrink:0, display:'flex', flexDirection:'column', background:'#F2F2F7', height:'100%', minWidth:220, overflow:'hidden' }}>
      {/* 헤더 */}
      <div style={{ padding:'20px 20px 8px', flexShrink:0 }}>
        <div style={{ fontSize:26, fontWeight:700, color:'#000', letterSpacing:-.8 }}>Theme Editor</div>
        <div style={{ fontSize:12, color:'#8E8E93', marginTop:2 }}>KakaoTalk Theme Builder</div>
      </div>

      {/* 탭 */}
      <div style={{ display:'flex', margin:'0 16px 4px', background:'rgba(116,116,128,.18)', borderRadius:9, padding:2, flexShrink:0 }}>
        {[['edit','편집'],['saved','저장됨']].map(([k,lbl]) => (
          <button key={k} onClick={() => setTab(k)} style={{
            flex:1, padding:'6px 0', border:'none', borderRadius:7,
            fontSize:12, fontWeight:500, cursor:'pointer', fontFamily:'inherit',
            background: tab===k ? '#fff' : 'transparent',
            color: tab===k ? '#000' : '#6D6D72',
            boxShadow: tab===k ? '0 1px 4px rgba(0,0,0,.12)' : 'none',
          }}>{lbl}</button>
        ))}
      </div>

      {/* 콘텐츠 */}
      <div style={{ flex:1, overflowY:'auto', paddingBottom:4 }}>
        {tab === 'edit' ? (
          <>
            <div style={{ height:6 }}/>
            <PresetPicker />
            <div style={SL}>Theme Name</div>
            <div style={{ margin:'0 16px', background:'#fff', borderRadius:10, overflow:'hidden' }}>
              <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="나만의 테마"
                style={{ width:'100%', fontSize:15, padding:'12px 16px', border:'none', background:'transparent', color:'#000', fontFamily:'inherit', letterSpacing:-.1 }} />
            </div>
            {SECTIONS.map(s => (
              <div key={s.title}>
                <div style={SL}>{s.title}</div>
                <div style={{ margin:'0 16px', background:'#fff', borderRadius:10, overflow:'hidden' }}>
                  {s.fields.map((f,i) => <ColorRow key={f.key} colorKey={f.key} label={f.label} isLast={i===s.fields.length-1} type={f.type} min={f.min} max={f.max} unit={f.unit} />)}
                </div>
              </div>
            ))}
            <div style={{ height:8 }} />
          </>
        ) : (
          <>
            <div style={{ height:8 }} />
            <SavedThemesList />
          </>
        )}
      </div>

      {/* 하단 버튼 */}
      <div style={{ padding:'10px 16px 20px', borderTop:'0.5px solid rgba(60,60,67,.18)', flexShrink:0, display:'flex', flexDirection:'column', gap:8 }}>
        {tab === 'edit' && (<>
          <div style={{ display:'flex', gap:6 }}>
            <button onClick={undo} disabled={!canUndo} style={{ flex:1, padding:'8px 0', borderRadius:10, border:'none', background:canUndo?'#E5E5EA':'#F8F8F8', color:canUndo?'#000':'#C7C7CC', fontSize:12, fontWeight:600, cursor:canUndo?'pointer':'default', fontFamily:'inherit' }}>↩ 실행취소</button>
            <button onClick={redo} disabled={!canRedo} style={{ flex:1, padding:'8px 0', borderRadius:10, border:'none', background:canRedo?'#E5E5EA':'#F8F8F8', color:canRedo?'#000':'#C7C7CC', fontSize:12, fontWeight:600, cursor:canRedo?'pointer':'default', fontFamily:'inherit' }}>다시실행 ↪</button>
          </div>
          <div style={{ display:'flex', gap:6 }}>
            <button onClick={doSave} style={{ flex:1, padding:'11px 0', borderRadius:12, border:saveFlash?'none':'1.5px solid #007AFF', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit', letterSpacing:-.2, background:saveFlash?'#34C759':'#F2F2F7', color:saveFlash?'#fff':'#007AFF', transition:'all .2s' }}>
              {saveFlash ? '✓ 저장됨!' : '💾 저장'}
            </button>
            <label style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'11px 0', borderRadius:12, border:'1.5px solid rgba(0,0,0,.15)', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit', background:'#F2F2F7', color:'#3C3C43' }}>
              📂 불러오기
              <input type="file" accept=".ktheme" onChange={e=>{ if(e.target.files[0]) importTheme(e.target.files[0]); e.target.value=''; }} style={{ display:'none' }}/>
            </label>
          </div>
        </>)}
        <button onClick={doExport} disabled={status==='busy'} style={{
          width:'100%', padding:'12px 0', borderRadius:12, border:'none',
          fontSize:15, fontWeight:600, cursor:status==='busy'?'default':'pointer',
          fontFamily:'inherit', letterSpacing:-.2, transition:'opacity .15s',
          background: status==='done'?'#34C759': status==='err'?'#FF3B30': status==='busy'?'#adadad':'#007AFF',
          color:'#fff', opacity:status==='busy'?.7:1,
        }}>
          {{ idle:'.ktheme 파일 다운로드', busy:'생성 중…', done:'✓ 다운로드 완료!', err:'오류 — 다시 시도' }[status]}
        </button>
        {tab === 'edit' && (
          <button onClick={reset} style={{ width:'100%', padding:'7px 0', background:'none', border:'none', fontSize:13, color:'#FF3B30', cursor:'pointer', fontFamily:'inherit' }}>
            기본값으로 초기화
          </button>
        )}
      </div>
    </aside>
  );
}

function PhoneFrame({ tab }) {
  const SW=307, SH=655, BL=11, BT=12, BB=33;
  const FW = SW + BL*2;
  const FH = SH + BT + BB;
  return (
    <div style={{ position:'relative', width:FW, height:FH, flexShrink:0 }}>
      {/* 1. 앱 콘텐츠 */}
      <div style={{ position:'absolute', top:BT, left:BL, width:SW, height:SH, borderRadius:44, overflow:'hidden', zIndex:1, background:'#fff' }}>
        {tab === 'passcode' ? <PasscodePreview /> : tab === 'chat' ? <ChatPreview /> : <HomePreview />}
      </div>
      {/* 2. SVG 프레임 오버레이 */}
      <svg width={FW} height={FH} viewBox={`0 0 ${FW} ${FH}`} fill="none"
        style={{ position:'absolute', top:0, left:0, zIndex:10, pointerEvents:'none' }}>
        <defs>
          <linearGradient id="frameV" x1="0" y1="0" x2="0" y2={FH} gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stopColor="#4A4A4E"/>
            <stop offset="18%"  stopColor="#2C2C2E"/>
            <stop offset="50%"  stopColor="#1C1C1E"/>

/* ── useIsMobile ──────────────────────────────────────────────── */
function useIsMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth < 768);
  useEffect(() => {
    const h = () => setMobile(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return mobile;
}

/* ── 모바일 레이아웃 ─────────────────────────────────────────── */
function MobileApp() {
  const [page, setPage] = useState('edit'); // 'edit' | 'saved' | 'preview'
  const [peekOpen, setPeekOpen] = useState(false);
  const { name, reset, colors, saveTheme, undo, redo, canUndo, canRedo, importTheme } = useTheme();
  const [saveFlash, setSaveFlash] = useState(false);

  function doSave() {
    saveTheme(name, colors);
    setSaveFlash(true);
    setTimeout(() => setSaveFlash(false), 1800);
  }
  const [status, setStatus] = useState('idle');

  async function doExport() {
    setStatus('busy');
    try {
      const blob = await buildKtheme(name, colors);
      const url  = URL.createObjectURL(blob);
      Object.assign(document.createElement('a'), { href:url, download:`${name.replace(/[^a-zA-Z0-9가-힣_-]/g,'_')}.ktheme` }).click();
      URL.revokeObjectURL(url);
      setStatus('done');
    } catch(e) { console.error(e); setStatus('err'); }
    setTimeout(() => setStatus('idle'), 2500);
  }

  const SL = { fontSize:11, fontWeight:600, color:'#6D6D72', textTransform:'uppercase', letterSpacing:'.06em', padding:'16px 16px 4px' };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100dvh', background:'#F2F2F7', overflow:'hidden' }}>
      {/* 상단 헤더 */}
      <div style={{ padding:'16px 16px 10px', background:'#F2F2F7', flexShrink:0, paddingTop:'max(16px, env(safe-area-inset-top, 16px))' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <div style={{ fontSize:22, fontWeight:700, color:'#000', letterSpacing:-.6 }}>Theme Editor</div>
            <div style={{ fontSize:12, color:'#8E8E93', marginTop:1 }}>KakaoTalk Theme Builder</div>
          </div>
          <div style={{ display:'flex', gap:5, alignItems:'center' }}>
            <button onClick={undo} disabled={!canUndo} style={{ padding:'8px 10px', borderRadius:10, border:'none', fontSize:15, cursor:canUndo?'pointer':'default', background:'#E5E5EA', color:canUndo?'#000':'#C7C7CC', fontFamily:'inherit' }}>↩</button>
            <button onClick={redo} disabled={!canRedo} style={{ padding:'8px 10px', borderRadius:10, border:'none', fontSize:15, cursor:canRedo?'pointer':'default', background:'#E5E5EA', color:canRedo?'#000':'#C7C7CC', fontFamily:'inherit' }}>↪</button>
            <label style={{ padding:'8px 10px', borderRadius:10, fontSize:15, cursor:'pointer', background:'#E5E5EA', color:'#3C3C43', display:'flex', alignItems:'center', justifyContent:'center' }}>
              📂<input type="file" accept=".ktheme" onChange={e=>{ if(e.target.files[0]) importTheme(e.target.files[0]); e.target.value=''; }} style={{ display:'none' }}/>
            </label>
            <button onClick={doExport} disabled={status==='busy'} style={{ padding:'8px 12px', borderRadius:10, border:'none', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit', background:status==='done'?'#34C759':status==='err'?'#FF3B30':status==='busy'?'#aaa':'#007AFF', color:'#fff' }}>
              {{ idle:'⬇', busy:'…', done:'✓', err:'!' }[status]}
            </button>
            <button onClick={doSave} style={{ padding:'8px 10px', borderRadius:10, border:'none', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit', background:saveFlash?'#34C759':'#F2F2F7', color:saveFlash?'#fff':'#007AFF', transition:'all .2s' }}>
              {saveFlash ? '✓' : '💾'}
            </button>
          </div>
        </div>
      </div>

      {/* 컨텐츠 영역 */}
      <div style={{ flex:1, overflow:'hidden', position:'relative' }}>
        {/* 편집 탭 */}
        <div style={{ position:'absolute', inset:0, overflowY:'auto', display: page==='edit' ? 'block' : 'none' }}>
          <div style={{ height:6 }}/>
          <PresetPicker />
          <div style={SL}>Theme Name</div>
          <MobileNameInput />
          {SECTIONS.map(s => (
            <div key={s.title}>
              <div style={SL}>{s.title}</div>
              <div style={{ margin:'0 16px', background:'#fff', borderRadius:10, overflow:'hidden' }}>
                {s.fields.map((f,i) => <ColorRow key={f.key} colorKey={f.key} label={f.label} isLast={i===s.fields.length-1} type={f.type} min={f.min} max={f.max} unit={f.unit} />)}
              </div>
            </div>
          ))}
          <button onClick={reset} style={{ display:'block', width:'calc(100% - 32px)', margin:'12px 16px 8px', padding:'10px', background:'none', border:'none', fontSize:13, color:'#FF3B30', cursor:'pointer', fontFamily:'inherit' }}>
            기본값으로 초기화
          </button>
          <div style={{ height:'max(20px, env(safe-area-inset-bottom, 20px))' }}/>
        </div>

        {/* 저장된 테마 탭 */}
        <div style={{ position:'absolute', inset:0, overflowY:'auto', display: page==='saved' ? 'block' : 'none', background:'#F2F2F7' }}>
          <div style={{ height:8 }}/>
          <SavedThemesList onClose={() => setPage('edit')} />
          <div style={{ height:'max(20px, env(safe-area-inset-bottom, 20px))' }}/>
        </div>

        {/* 미리보기 탭 */}
        <div style={{ position:'absolute', inset:0, overflowY:'auto', display: page==='preview' ? 'flex' : 'none', flexDirection:'column', alignItems:'center', background:'#E5E5EA', padding:'12px 12px 0' }}>

      {/* 하단 탭바 */}
      <div style={{ display:'flex', background:'rgba(249,249,249,0.94)', backdropFilter:'blur(20px)', borderTop:'0.5px solid rgba(60,60,67,.2)', flexShrink:0, paddingBottom:'max(8px, env(safe-area-inset-bottom, 8px))' }}>
        {[['edit','✏️','편집'],['saved','💾','저장됨'],['preview','📱','미리보기']].map(([k,ic,lbl]) => (
          <button key={k} onClick={() => setPage(k)} style={{
            flex:1, display:'flex', flexDirection:'column', alignItems:'center', padding:'8px 0 4px',
            background:'none', border:'none', cursor:'pointer', gap:2,
          }}>
            <span style={{ fontSize:22 }}>{ic}</span>
            <span style={{ fontSize:10, fontWeight:page===k?600:400, color:page===k?'#007AFF':'#8E8E93', letterSpacing:-.2 }}>{lbl}</span>
          </button>
        ))}
      </div>

      {/* FAB — 편집 중 미리보기 버튼 */}
      {page === 'edit' && (
        <button onClick={() => setPeekOpen(true)} style={{
          position:'fixed', bottom:80, right:16,
          width:50, height:50, borderRadius:25,
          background:'#007AFF', border:'none', cursor:'pointer',
          boxShadow:'0 4px 14px rgba(0,122,255,.45)',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:22, zIndex:200,
          WebkitTapHighlightColor:'transparent',
        }} aria-label="미리보기">
          👁
        </button>
      )}

      {/* 바텀시트 — 편집 중 미리보기 오버레이 */}
      {peekOpen && (
        <div style={{
          position:'fixed', inset:0, zIndex:300,
          display:'flex', flexDirection:'column', justifyContent:'flex-end',
        }}>
          {/* 딤 배경 — 탭하면 닫힘 */}
          <div onClick={() => setPeekOpen(false)} style={{
            position:'absolute', inset:0, background:'rgba(0,0,0,.45)',

            position:'relative', background:'#E5E5EA',
            borderRadius:'20px 20px 0 0',
            maxHeight:'88dvh', overflowY:'auto',
            paddingBottom:'max(16px, env(safe-area-inset-bottom, 16px))',
            animation:'slideUp .25s ease',

            {/* 핸들 */}
            <div style={{ display:'flex', justifyContent:'center', padding:'10px 0 4px' }}>

            <div style={{ display:'flex', justifyContent:'flex-end', padding:'0 16px 8px' }}>
              <button onClick={() => setPeekOpen(false)} style={{
                background:'rgba(116,116,128,.18)', border:'none', borderRadius:99,
                fontSize:12, fontWeight:600, color:'#3C3C43', padding:'4px 12px',
                cursor:'pointer', fontFamily:'inherit',
              }}>닫기</button>
            </div>
            <MobilePreview />
            <div style={{ height:8 }} />
          </div>
        </div>
      )}
    </div>
  );
}

/* 모바일 미리보기: 세그먼트 컨트롤 + 스케일된 폰 프레임 */
function MobilePreview() {
  const [tab, setTab] = useState('chat');
  const { activeKey } = useTheme();
  const [vw, setVw]   = useState(window.innerWidth);

  useEffect(() => {
    if (activeKey && TAB_MAP[activeKey]) setTab(TAB_MAP[activeKey]);
  }, [activeKey]);

  useEffect(() => {
    const h = () => setVw(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);

  const FW = 329, FH = 700;
  const avail = Math.min(vw - 24, 380);      // 좌우 패딩 12px씩
  const scale = Math.min(1, avail / FW);
  const scaledH = FH * scale;

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:10, width:'100%' }}>
      {/* 세그먼트 컨트롤 */}
      <div style={{ display:'flex', background:'rgba(116,116,128,.18)', borderRadius:9, padding:2, flexShrink:0 }}>
        {[['passcode','잠금 화면'],['home','채팅 목록'],['chat','채팅방']].map(([k,lbl]) => (
          <button key={k} onClick={() => setTab(k)} style={{
            padding:'5px 14px', border:'none', borderRadius:7,
            fontSize:12, fontWeight:500, cursor:'pointer', fontFamily:'inherit',
            background: tab===k ? '#fff' : 'transparent',
            color: tab===k ? '#000' : '#6D6D72',
            boxShadow: tab===k ? '0 1px 4px rgba(0,0,0,.12)' : 'none',
          }}>{lbl}</button>
        ))}
      </div>

      {/* 스케일된 폰 프레임 */}
      <div style={{ width: FW*scale, height: scaledH, flexShrink:0 }}>
        <div style={{ width:FW, height:FH, transform:`scale(${scale})`, transformOrigin:'top left' }}>
          <PhoneFrame tab={tab} />
        </div>
      </div>
    </div>
  );
}

/* ── App — 데스크톱: 좌우 드래그 조절 ───────────────────────── */
function App() {
  const isMobile = useIsMobile();
  const [leftWidth, setLeftWidth] = useState(292);
  const isDragging = useRef(false);
  const dragStartX = useRef(0);
  const dragStartW = useRef(292);
  const dividerRef = useRef(null);

  useEffect(() => {
    const onMove = (e) => {
      if (!isDragging.current) return;
      const next = Math.max(220, Math.min(520, dragStartW.current + (e.clientX - dragStartX.current)));
      setLeftWidth(next);
    };
    const onUp = () => {
      if (!isDragging.current) return;
      isDragging.current = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      if (dividerRef.current) dividerRef.current.classList.remove('dragging');
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup',   onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, []);

  const startDrag = (e) => {
    isDragging.current = true;
    dragStartX.current = e.clientX;
    dragStartW.current = leftWidth;
    document.body.style.cursor    = 'col-resize';
    document.body.style.userSelect = 'none';
    if (dividerRef.current) dividerRef.current.classList.add('dragging');
    e.preventDefault();
  };

  if (isMobile) {
    return (
      <ThemeProvider>
        <MobileApp />
      </ThemeProvider>
    );
  }

  return (
    <ThemeProvider>
      <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
        <ControlPanel width={leftWidth} />
        <div ref={dividerRef} onMouseDown={startDrag} className="divider"
          style={{ width:5, flexShrink:0, cursor:'col-resize', zIndex:10, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
            {[0,1,2,3].map(i => <div key={i} style={{ width:2, height:2, borderRadius:1, background:'rgba(255,255,255,.5)' }}/>)}
          </div>
        </div>
        <PreviewPanel />
      </div>
    </ThemeProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
